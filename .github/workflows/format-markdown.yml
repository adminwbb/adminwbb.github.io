name: Format Markdown

on:
  push:
    branches:
      - master
      - main
    paths:
      - '**.md'

jobs:
  format:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Oxfmt
        run: npm install -D oxfmt@latest

      - name: Rename files by title
        run: python3 scripts/rename_by_title.py content/post

      - name: Format Markdown
        run: npx oxfmt --write "**/*.md"

      - name: Commit and Push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🎨 Format Markdown with Oxfmt"
          commit_user_name: "GitHub Actions"
          commit_user_email: "actions@github.com"