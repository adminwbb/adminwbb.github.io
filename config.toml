baseURL = "https://adminwbb.github.io/"
title = "WBB"
theme = "stack"
paginate = 5
disqusShortname = "adminwbb"
DefaultContentLanguage = "en"

[languages.en]
locale = "en"
direction = "ltr"
label = "English"
title = "WBB"
weight = 1

[languages.zh-cn]
locale = "zh-CN"
direction = "ltr"
label = "简体中文"
title = "WBB"
weight = 2

[permalinks]
    post = "/p/:slug/"
    page = "/:slug/"

[params]
    mainSections = ["post"]
    featuredImageField = "image"
    rssFullContent = true
    
    [params.dateFormat]
        published = "Jan 02, 2006"
        lastUpdated = "Jan 02, 2006 15:04 MST"
        
    [params.sidebar]
        emoji = "🍥"
        avatar = "titleh.jpg"
        subtitle = "羡慕苦行者，但是又贪恋世俗，嫉妒别人过多比自己好，但是也只能无能狂怒，想要找人说话，但是又没人搭理，这就是真实的我。"

    [params.article]
        math = false
        [params.article.license]
            enabled = true 
            default = "Licensed under MIT."
            
    [params.comments]
        enabled = true
        provider = "utterances"         # Available: disqus, utterances    
        [params.comments.utterances]
            repo = "adminwbb/adminwbb.github.io"
            issueTerm = "pathname"
            label = "GitComments"         # Optional
            theme = "preferred-color-scheme"
            
    [params.widgets]
        enabled = ['archives', 'tag-cloud']
        [params.widgets.archives]
            limit = 5
            ### Archives page relative URL
            path = "archives"       
        [params.widgets.tagCloud]
            limit = 10
            
    [params.opengraph]
        [params.opengraph.twitter]
            site = ""
            card = "summary_large_image"
            
    [params.defaultImage]
        [params.defaultImage.opengraph]
            enabled = false
            local = false
            src = ""

[menu]
    [[menu.main]]
        identifier = "home"
        name = "Home"
        url = "/"
        weight = -100
        pre = "home"
    [[menu.main]]
        identifier = "about-cn"
        name = "About"
        url = "about"
        weight = -90
        pre = "user"
    [[menu.main]]
        identifier = "archives"
        name = "Archives"
        url = "archives"
        weight = -70
        pre = "archives"

[related]
    includeNewer = true
    threshold = 60
    toLower = false

    [[related.indices]]
        name = "tags"
        weight = 100

    [[related.indices]]
        name = "categories"
        weight = 200

[markup]
    [markup.highlight]
        noClasses = false
